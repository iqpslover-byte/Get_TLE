name: Fetch Satellite Data

on:
  schedule:
    - cron: '0 * * * *'  # 毎時間実行
  workflow_dispatch:     # 手動実行も可能

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Space-Track Satcat
        env:
          SPACETRACK_USERNAME: ${{ secrets.SPACETRACK_USERNAME }}
          SPACETRACK_PASSWORD: ${{ secrets.SPACETRACK_PASSWORD }}
        run: |
          python3 << 'EOF'
          import requests
          import json
          import os
          from datetime import datetime

          username = os.environ['SPACETRACK_USERNAME']
          password = os.environ['SPACETRACK_PASSWORD']

          session = requests.Session()
          session.post('https://www.space-track.org/ajaxauth/login',
                       data={'identity': username, 'password': password})

          url = 'https://www.space-track.org/basicspacedata/query/class/satcat/orderby/NORAD_CAT_ID%20desc/format/json'

          try:
              response = session.get(url, timeout=120)
              response.raise_for_status()
              raw = response.json()

              data = []
              for row in raw:
                  if not row.get('NORAD_CAT_ID'):
                      continue
                  data.append({
                      'NORAD_CAT_ID': row.get('NORAD_CAT_ID', ''),
                      'OBJECT_NAME':  row.get('OBJECT_NAME', row.get('SATNAME', '')),
                      'INTLDES':      row.get('INTLDES', row.get('OBJECT_ID', '')),
                      'OBJECT_TYPE':  row.get('OBJECT_TYPE', ''),
                      'COUNTRY':      row.get('COUNTRY', ''),
                      'LAUNCH':       row.get('LAUNCH', ''),
                      'SITE':         row.get('SITE', ''),
                      'DECAY':        row.get('DECAY', ''),
                      'PERIOD':       row.get('PERIOD', ''),
                      'INCL':         row.get('INCLINATION', row.get('INCL', '')),
                      'APOGEE':       row.get('APOGEE', ''),
                      'PERIGEE':      row.get('PERIGEE', ''),
                      'RCS':          row.get('RCSVALUE', row.get('RCS', '')),
                  })

              os.makedirs('data', exist_ok=True)
              updated_at = datetime.utcnow().isoformat() + 'Z'

              with open('data/satcat.json', 'w', encoding='utf-8') as f:
                  json.dump({'updated_at': updated_at, 'count': len(data), 'data': data},
                            f, separators=(',', ':'), ensure_ascii=False)

              with open('data/satcat_meta.json', 'w', encoding='utf-8') as f:
                  json.dump({'updated_at': updated_at, 'count': len(data)},
                            f, separators=(',', ':'))

              print(f'✓ {len(data)} 件のカタログデータを保存しました')

          except Exception as e:
              print(f'✗ エラー: {e}')
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --local user.email "iqps.lover@gmail.com"
          git config --local user.name "iqpslover-byte"
          git add data/satcat.json data/satcat_meta.json
          git commit -m "Update satcat: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          git push origin main
